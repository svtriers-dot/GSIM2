# /etc/nginx/sites-available/gsim2
# After certbot --nginx запустит — добавит SSL автоматически
server {
    listen 80;
    listen [::]:80;
    server_name toc.tesstech.ru;

    # Будет дополнено certbot:
    # listen 443 ssl http2;
    # ssl_certificate ...
    # ssl_certificate_key ...

    client_max_body_size 2M;

    # Проксируем всё на Express
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (на будущее, если HMR/realtime)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Static assets — отдаём напрямую (минуя Node)
    location /assets/ {
        alias /opt/gsim2/dist/public/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;
}
