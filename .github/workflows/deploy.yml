name: Deploy to VM (toc.tesstech.ru)

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "server/**"
      - "shared/**"
      - "script/**"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - "drizzle.config.ts"
      - "tsconfig.json"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "components.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 12m
          envs: YANDEX_CLIENT_ID,YANDEX_CLIENT_SECRET
          script: |
            set -euo pipefail
            cd /opt/gsim2/src
            sudo -u gsim git pull --ff-only origin main
            sudo -u gsim npm ci --no-audit --no-fund

            # Применяем миграции схемы (идемпотентно)
            DB_URL=$(sudo grep '^DATABASE_URL=' /opt/gsim2/.env | cut -d= -f2-)
            sudo -u gsim DATABASE_URL="$DB_URL" npm run db:push

            # JWT_SECRET — добавляем если ещё не задан
            if ! sudo grep -q '^JWT_SECRET=' /opt/gsim2/.env; then
              echo "JWT_SECRET=$(openssl rand -hex 32)" | sudo tee -a /opt/gsim2/.env >/dev/null
              echo "[deploy] JWT_SECRET сгенерирован"
            fi

            # SUPER_ADMIN_EMAIL — задаём дефолт test@tesstech.ru если не задан
            if ! sudo grep -q '^SUPER_ADMIN_EMAIL=' /opt/gsim2/.env; then
              echo "SUPER_ADMIN_EMAIL=test@tesstech.ru" | sudo tee -a /opt/gsim2/.env >/dev/null
              echo "[deploy] SUPER_ADMIN_EMAIL=test@tesstech.ru добавлен (можно изменить вручную в .env)"
            fi

            # Yandex OAuth — синхронизируем из GitHub Secrets если заданы
            if [ -n "${YANDEX_CLIENT_ID:-}" ] && [ -n "${YANDEX_CLIENT_SECRET:-}" ]; then
              sudo sed -i '/^YANDEX_CLIENT_ID=/d' /opt/gsim2/.env
              sudo sed -i '/^YANDEX_CLIENT_SECRET=/d' /opt/gsim2/.env
              sudo sed -i '/^YANDEX_REDIRECT_URI=/d' /opt/gsim2/.env
              echo "YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID}" | sudo tee -a /opt/gsim2/.env >/dev/null
              echo "YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET}" | sudo tee -a /opt/gsim2/.env >/dev/null
              echo "YANDEX_REDIRECT_URI=https://toc.tesstech.ru/api/trainer/auth/yandex/callback" | sudo tee -a /opt/gsim2/.env >/dev/null
              echo "[deploy] Yandex OAuth credentials обновлены"
            else
              echo "[deploy] Yandex OAuth credentials не заданы — кнопка останется скрыта"
            fi

            sudo -u gsim npm run build

            sudo cp -r /opt/gsim2/src/dist/* /opt/gsim2/dist/
            sudo cp -rT /opt/gsim2/src/node_modules /opt/gsim2/node_modules
            sudo chown -R gsim:gsim /opt/gsim2

            sudo systemctl restart gsim2

            # Smoke-test с retry (сервис может не успеть подняться сразу)
            sleep 5
            for i in 1 2 3 4 5; do
              if curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" https://toc.tesstech.ru/; then
                break
              fi
              if [ $i -eq 5 ]; then
                echo "[deploy] smoke-test failed после 5 попыток"
                sudo journalctl -u gsim2 -n 50 --no-pager
                exit 1
              fi
              echo "[deploy] retry $i..."
              sleep 3
            done

            echo "[deploy] OK"
