name: Deploy to VM (toc.tesstech.ru)

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "server/**"
      - "shared/**"
      - "script/**"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - "drizzle.config.ts"
      - "tsconfig.json"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "components.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -euo pipefail
            cd /opt/gsim2/src
            sudo -u gsim git pull --ff-only origin main
            sudo -u gsim npm ci --no-audit --no-fund

            # Применяем миграции схемы (идемпотентно)
            DB_URL=$(sudo grep '^DATABASE_URL=' /opt/gsim2/.env | cut -d= -f2-)
            sudo -u gsim DATABASE_URL="$DB_URL" npm run db:push

            # JWT_SECRET — добавляем если ещё не задан
            if ! sudo grep -q '^JWT_SECRET=' /opt/gsim2/.env; then
              echo "JWT_SECRET=$(openssl rand -hex 32)" | sudo tee -a /opt/gsim2/.env >/dev/null
              echo "[deploy] JWT_SECRET сгенерирован"
            fi

            sudo -u gsim npm run build

            sudo cp -r /opt/gsim2/src/dist/* /opt/gsim2/dist/
            sudo cp -rT /opt/gsim2/src/node_modules /opt/gsim2/node_modules
            sudo chown -R gsim:gsim /opt/gsim2

            sudo systemctl restart gsim2

            # Smoke-test
            sleep 3
            curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" https://toc.tesstech.ru/ || \
              (echo "[deploy] smoke-test failed" && sudo journalctl -u gsim2 -n 50 --no-pager && exit 1)

            echo "[deploy] OK — sha $GITHUB_SHA"
